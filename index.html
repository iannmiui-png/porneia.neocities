<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sophie Miu - porneia.neocities</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; }
#header { background: linear-gradient(90deg, #5BCEFA 0%, #F5A9B8 25%, #FFFFFF 50%, #F5A9B8 75%, #5BCEFA 100%); padding: 8px 16px; border-bottom: 2px solid #F5A9B8; }
#header h1 { font-size: 14px; color: #1a1a2e; text-shadow: 0 0 4px rgba(255,255,255,0.6); }
#header span { font-size: 11px; color: #2a2a3e; }
#output-wrap { flex: 1; overflow-y: auto; padding: 8px 16px; white-space: pre-wrap; word-wrap: break-word; font-size: 14px; line-height: 1.4; border-left: 3px solid #5BCEFA; border-right: 3px solid #F5A9B8; }
#output-wrap .game-text { color: #dce6f0; }
#output-wrap .input-echo { color: #5BCEFA; }
#input-row { display: flex; background: #16213e; border-top: 2px solid #F5A9B8; padding: 6px 16px; }
#input-row label { color: #F5A9B8; line-height: 28px; margin-right: 8px; font-weight: bold; }
#cmd { flex: 1; background: #0a0a1a; color: #5BCEFA; border: 1px solid #5BCEFA44; padding: 4px 8px; font-family: 'Courier New', monospace; font-size: 14px; outline: none; }
#cmd:focus { border-color: #F5A9B8; box-shadow: 0 0 6px #F5A9B844; }
#status-bar { background: linear-gradient(90deg, #5BCEFA33, #F5A9B833, #FFFFFF22, #F5A9B833, #5BCEFA33); padding: 4px 16px; font-size: 11px; color: #F5A9B8; display: flex; justify-content: space-between; border-top: 1px solid #5BCEFA44; }
</style>
</head>
<body>
<div id="header">
  <h1>Lost Kingdom</h1>
  <span id="load-status">Loading…</span>
</div>
<div id="output-wrap"></div>
<div id="input-row">
  <label>&gt;</label>
  <input id="cmd" type="text" autocomplete="off" disabled placeholder="loading…">
</div>
<div id="status-bar">
  <span id="step-count">Steps: 0</span>
  <span id="save-info"></span>
</div>

<script src="tlsb.js" defer></script>
</body>
</html>
